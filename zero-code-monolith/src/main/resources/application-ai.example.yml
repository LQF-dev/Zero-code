# application-ai.example.yml: AI 模型与推理服务专用配置模板（不含隐私）
spring:
  devtools:
    restart:
      enabled: false

langchain4j:
  open-ai:
    chat-model:
      base-url: ${ZERO_CODE_LLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
      api-key: ${ZERO_CODE_LLM_API_KEY:replace_with_your_api_key}
      model-name: ${ZERO_CODE_LLM_MODEL_NAME:glm-4.7}
      max-tokens: ${ZERO_CODE_LLM_MAX_TOKENS:8192}
      log-requests: true
      log-responses: true

    streaming-chat-model:
      base-url: ${ZERO_CODE_LLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
      api-key: ${ZERO_CODE_LLM_API_KEY:replace_with_your_api_key}
      model-name: ${ZERO_CODE_LLM_MODEL_NAME:glm-4.7}
      timeout: 240s
      max-tokens: ${ZERO_CODE_LLM_STREAM_MAX_TOKENS:32768}
      log-requests: true
      log-responses: true
      max-retries: 3

    reasoning-model-name: ${ZERO_CODE_REASONING_MODEL_NAME:glm-4.7}
    reasoning-max-tokens: ${ZERO_CODE_REASONING_MAX_TOKENS:32768}
    reasoning-return-thinking: true
    reasoning-send-thinking: true
    reasoning-thinking-field: reasoning_content
    # DeepSeek V4 可设置为 enabled，并配合 reasoning-effort: high/max。
    # 其它 OpenAI 兼容供应商如不支持 thinking 参数，请保持为空。
    reasoning-thinking-type: ${ZERO_CODE_REASONING_THINKING_TYPE:}
    reasoning-effort: ${ZERO_CODE_REASONING_EFFORT:}

# 上下文压缩配置
context-compaction:
  # 触发自动压缩的 token 估算阈值
  # 建议设为所用模型最大上下文长度的 80%
  # 例如：DeepSeek V4-Pro 最大上下文 1M tokens → 800000
  #       GLM-4 最大上下文 128K tokens → 102400
  #       Qwen 最大上下文 128K tokens → 102400
  token-threshold: ${ZERO_CODE_COMPACTION_TOKEN_THRESHOLD:800000}
  # 送入摘要模型的最大字符数（避免摘要请求本身超长）
  max-summary-input-chars: ${ZERO_CODE_COMPACTION_MAX_SUMMARY_CHARS:300000}
