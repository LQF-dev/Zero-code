spring:
  profiles:
    active: ai
  application:
    name: zero-code
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${ZERO_CODE_DB_URL:jdbc:mysql://localhost:3306/zero_code}
    username: ${ZERO_CODE_DB_USERNAME:root}
    password: ${ZERO_CODE_DB_PASSWORD:your_db_password}
  data:
    redis:
      host: ${ZERO_CODE_REDIS_HOST:localhost}
      port: ${ZERO_CODE_REDIS_PORT:6379}
      password: ${ZERO_CODE_REDIS_PASSWORD:}
      ttl: 3600
  session:
    store-type: redis
    timeout: 2592000

server:
  port: ${ZERO_CODE_SERVER_PORT:8123}
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ai.zerocode.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

cos:
  client:
    host: ${ZERO_CODE_COS_HOST:https://your-bucket.cos.ap-shanghai.myqcloud.com}
    secretId: ${ZERO_CODE_COS_SECRET_ID:your_cos_secret_id}
    secretKey: ${ZERO_CODE_COS_SECRET_KEY:your_cos_secret_key}
    region: ${ZERO_CODE_COS_REGION:ap-shanghai}
    bucket: ${ZERO_CODE_COS_BUCKET:your-bucket-name}

pexels:
  api-key: ${ZERO_CODE_PEXELS_API_KEY:your_pexels_api_key}

dashscope:
  api-key: ${ZERO_CODE_DASHSCOPE_API_KEY:your_dashscope_api_key}
  base-url: ${ZERO_CODE_DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
  image-model: ${ZERO_CODE_DASHSCOPE_IMAGE_MODEL:wan2.6-t2i}
