# application.example.yml: zero-code-app 配置模板（不含敏感信息）
spring:
  application:
    name: zero-code-app
  session:
    store-type: redis
    timeout: 2592000
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/replace_with_your_db_name
    username: replace_with_your_db_username
    password: replace_with_your_db_password
  data:
    redis:
      host: localhost
      port: 6379
      password: replace_with_your_redis_password
      ttl: 3600
  profiles:
    active: ai

server:
  port: 8125
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

springdoc:
  group-configs:
    - group: default
      packages-to-scan: com.ai.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

dubbo:
  registry:
    address: nacos://127.0.0.1:8848?username=replace_with_your_nacos_username&password=replace_with_your_nacos_password
    register-mode: instance
  protocol:
    name: tri
    port: 50053
  consumer:
    timeout: 120000
  provider:
    timeout: 120000

pexels:
  api-key: replace_with_your_pexels_api_key

cos:
  client:
    host: https://replace-with-your-cos-host
    secretId: replace_with_your_cos_secret_id
    secretKey: replace_with_your_cos_secret_key
    region: replace_with_your_cos_region
    bucket: replace_with_your_cos_bucket
