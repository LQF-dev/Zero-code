# application-ai.example.yml: AI 模型与推理服务专用配置模板（不含敏感信息）
spring:
  devtools:
    restart:
      enabled: false

# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: replace_with_your_llm_api_key
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      timeout: 120s
      connect-timeout: 15s
      max-tokens: 8192
      max-retries: 3
    #      strict-json-schema: true
    #      response-format: json_object
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: replace_with_your_llm_api_key
      model-name: deepseek-reasoner
      timeout: 240s
      max-tokens: 8192
      log-requests: true
      log-responses: true
      max-retries: 3

# ==========================================================
# 供应商切换模板（按需复制到上方 langchain4j.open-ai 生效）
# 你只需要替换 API KEY；Secret Key 在 OpenAI 兼容模式下通常不需要
# 如你的网关要求 Secret Key，可放在环境变量 ZERO_CODE_LLM_SECRET_KEY 供自定义网关使用
# ==========================================================

